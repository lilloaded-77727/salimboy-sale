<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kassa | Salimboy Sale</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../assets/css/cashier.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
    
    <div class="app-container">
        
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-store"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Salimboy</span>
                    <span class="brand-sub">Sale Pro</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-th-large"></i><span>Boshqaruv</span></a></li>
                    <li><a href="cashier.html" class="active"><i class="fas fa-cash-register"></i><span>Kassa</span><span class="badge">12</span></a></li>
                    <li><a href="warehouse.html"><i class="fas fa-boxes"></i><span>Ombor</span><span class="badge">48</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-line"></i><span>Hisobot</span></a></li>
                    <li><a href="expenses.html"><i class="fas fa-wallet"></i><span>Rashodlar</span></a></li>
                    <li><a href="employees.html"><i class="fas fa-users"></i><span>Hodimlar</span></a></li>
                    <li><a href="debtors.html"><i class="fas fa-hand-holding-usd"></i><span>Nasiya</span><span class="badge danger">8</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i><span>Sozlamalar</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <img src="https://ui-avatars.com/api/?name=Salimboy&background=6C63FF&color=fff&size=40&bold=true" alt="User" />
                    <div class="user-info">
                        <span class="user-name">Salimboy</span>
                        <span class="user-role">Admin</span>
                    </div>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content cashier-main">
            
            <!-- ===== HEADER ===== -->
            <header class="top-header cashier-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <h2><i class="fas fa-cash-register"></i> Kassa</h2>
                </div>
                <div class="header-right">
                    <div class="shift-status" id="shiftStatus">
                        <span class="status-dot closed"></span>
                        <span>Smena: Yopiq</span>
                    </div>
                    <button class="btn-shift closed" id="shiftBtn" onclick="toggleShift()">
                        <i class="fas fa-play"></i> Smena ochish
                    </button>
                    <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <div class="header-date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- ===== CASHIER CONTENT ===== -->
            <section class="cashier-content">
                
                <!-- ===== SHIFT MODAL ===== -->
                <div class="modal-overlay" id="shiftModal">
                    <div class="modal-content shift-modal">
                        <div class="modal-header">
                            <h3><i class="fas fa-door-open"></i> Smena ochish</h3>
                            <button class="modal-close" onclick="closeShiftModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Kassirni tanlang</label>
                                <select id="cashierSelect" class="form-control">
                                    <option value="">-- Kassir tanlang --</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-key"></i> Kassir kodi</label>
                                <input type="password" id="cashierCode" class="form-control" placeholder="****" maxlength="4" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-coins"></i> Boshlang'ich pul</label>
                                <input type="number" id="startCash" class="form-control" placeholder="0" value="500000" />
                            </div>
                            <button class="btn-primary" onclick="openShift()" style="width:100%;">
                                <i class="fas fa-check"></i> Smenani ochish
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ===== DEBTOR MODAL ===== -->
                <div class="modal-overlay" id="debtorModal">
                    <div class="modal-content debtor-modal">
                        <div class="modal-header">
                            <h3><i class="fas fa-hand-holding-usd"></i> Nasiya ma'lumotlari</h3>
                            <button class="modal-close" onclick="closeDebtorModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Qarzdor ismi</label>
                                <input type="text" id="debtorName" class="form-control" placeholder="To'liq ismini kiriting" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> Telefon raqami</label>
                                <input type="tel" id="debtorPhone" class="form-control" placeholder="+998 90 123 45 67" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-home"></i> Uy manzili</label>
                                <input type="text" id="debtorAddress" class="form-control" placeholder="Manzil..." />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-money-bill"></i> Qarz summasi</label>
                                <input type="number" id="debtorAmount" class="form-control" readonly />
                            </div>
                            <button class="btn-primary" onclick="confirmDebtor()" style="width:100%;">
                                <i class="fas fa-check"></i> Tasdiqlash
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ===== DISCOUNT MODAL ===== -->
                <div class="modal-overlay" id="discountModal">
                    <div class="modal-content discount-modal">
                        <div class="modal-header">
                            <h3><i class="fas fa-percent"></i> Skidka</h3>
                            <button class="modal-close" onclick="closeDiscountModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label><i class="fas fa-percent"></i> Skidka foizi (%)</label>
                                <input type="number" id="discountPercent" class="form-control" placeholder="0" min="0" max="100" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-money-bill"></i> Skidka summasi</label>
                                <input type="number" id="discountAmount" class="form-control" readonly />
                            </div>
                            <button class="btn-primary" onclick="confirmDiscount()" style="width:100%;">
                                <i class="fas fa-check"></i> Skidkani qo'llash
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ===== WEIGHT MODAL ===== -->
                <div class="modal-overlay" id="weightModal">
                    <div class="modal-content weight-modal">
                        <div class="modal-header">
                            <h3><i class="fas fa-weight-scale"></i> Og'irlikni kiriting</h3>
                            <button class="modal-close" onclick="closeWeightModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label><i class="fas fa-weight-scale"></i> Og'irlik (kg)</label>
                                <input type="number" id="productWeight" class="form-control" placeholder="0.000" step="0.001" />
                            </div>
                            <button class="btn-primary" onclick="confirmWeight()" style="width:100%;">
                                <i class="fas fa-check"></i> Tasdiqlash
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ===== CASHIER LAYOUT ===== -->
                <div class="cashier-layout">
                    
                    <!-- ===== CHAP TOMON: MAHSULOTLAR ===== -->
                    <div class="products-panel">
                        <div class="product-search">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="productSearch" placeholder="Mahsulot qidirish..." onkeyup="searchProducts()" />
                            </div>
                            <button class="btn-scanner" onclick="simulateScanner()">
                                <i class="fas fa-camera"></i> Skayner
                            </button>
                            <button class="btn-discount" onclick="openDiscountModal()">
                                <i class="fas fa-percent"></i>
                            </button>
                        </div>

                        <!-- Mahsulotlar grid -->
                        <div class="products-grid" id="productsGrid">
                            <!-- JS orqali to'ldiriladi -->
                        </div>
                    </div>

                    <!-- ===== O'NG TOMON: SAVAT ===== -->
                    <div class="cart-panel">
                        <div class="cart-header">
                            <h3><i class="fas fa-shopping-cart"></i> Savat</h3>
                            <span class="cart-count" id="cartCount">0</span>
                        </div>

                        <!-- Savatdagi mahsulotlar -->
                        <div class="cart-items" id="cartItems">
                            <div class="empty-cart">
                                <i class="fas fa-shopping-basket"></i>
                                <p>Savat bo'sh</p>
                            </div>
                        </div>

                        <!-- Savat jami -->
                        <div class="cart-total">
                            <div class="total-row">
                                <span>Mahsulotlar:</span>
                                <span id="totalItems">0</span>
                            </div>
                            <div class="total-row">
                                <span>Jami summa:</span>
                                <span id="totalAmount">0 so'm</span>
                            </div>
                        </div>

                        <!-- To'lov turlari -->
                        <div class="payment-methods">
                            <button class="payment-btn cash active" onclick="selectPayment('cash')">
                                <i class="fas fa-money-bill-wave"></i> Naxt
                            </button>
                            <button class="payment-btn terminal" onclick="selectPayment('terminal')">
                                <i class="fas fa-credit-card"></i> Terminal
                            </button>
                            <button class="payment-btn debt" onclick="selectPayment('debt')">
                                <i class="fas fa-hand-holding-usd"></i> Nasiya
                            </button>
                        </div>

                        <!-- To'lov va chek -->
                        <div class="checkout-actions">
                            <button class="btn-checkout" onclick="processPayment()">
                                <i class="fas fa-check-circle"></i> To'lov
                            </button>
                            <button class="btn-print" onclick="printReceipt()">
                                <i class="fas fa-print"></i> Chek
                            </button>
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="../data/database.js"></script>
    <script src="../assets/js/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/cashier.js"></script>
    <script src="../assets/js/app.js"></script>
</body>
</html>
