<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sozlamalar | Salimboy Sale</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../assets/css/settings.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
    
    <div class="app-container">
        
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-store"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Salimboy</span>
                    <span class="brand-sub">Sale Pro</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-th-large"></i><span>Boshqaruv</span></a></li>
                    <li><a href="cashier.html"><i class="fas fa-cash-register"></i><span>Kassa</span><span class="badge">12</span></a></li>
                    <li><a href="warehouse.html"><i class="fas fa-boxes"></i><span>Ombor</span><span class="badge">48</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-line"></i><span>Hisobot</span></a></li>
                    <li><a href="expenses.html"><i class="fas fa-wallet"></i><span>Rashodlar</span></a></li>
                    <li><a href="employees.html"><i class="fas fa-users"></i><span>Hodimlar</span></a></li>
                    <li><a href="debtors.html"><i class="fas fa-hand-holding-usd"></i><span>Nasiya</span><span class="badge danger">8</span></a></li>
                    <li><a href="settings.html" class="active"><i class="fas fa-cog"></i><span>Sozlamalar</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <img src="https://ui-avatars.com/api/?name=Salimboy&background=6C63FF&color=fff&size=40&bold=true" alt="User" />
                    <div class="user-info">
                        <span class="user-name">Salimboy</span>
                        <span class="user-role">Admin</span>
                    </div>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content settings-main">
            
            <!-- ===== HEADER ===== -->
            <header class="top-header settings-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <h2><i class="fas fa-cog"></i> Sozlamalar</h2>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <div class="header-date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- ===== SETTINGS CONTENT ===== -->
            <section class="settings-content">
                
                <!-- ===== TABS ===== -->
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="general" onclick="switchTab('general')">
                        <i class="fas fa-store"></i> Umumiy
                    </button>
                    <button class="tab-btn" data-tab="receipt" onclick="switchTab('receipt')">
                        <i class="fas fa-receipt"></i> Chek
                    </button>
                    <button class="tab-btn" data-tab="backup" onclick="switchTab('backup')">
                        <i class="fas fa-database"></i> Zaxira
                    </button>
                </div>

                <!-- ===== PANELS ===== -->
                <div class="settings-panels">
                    
                    <!-- ===== GENERAL ===== -->
                    <div class="settings-panel active" id="panel-general">
                        <div class="settings-card">
                            <h3><i class="fas fa-store"></i> Do'kon ma'lumotlari</h3>
                            <div class="form-group">
                                <label><i class="fas fa-store"></i> Do'kon nomi</label>
                                <input type="text" id="shopName" class="form-control" placeholder="Do'kon nomi" value="Salimboy Sale" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Do'kon egasi</label>
                                <input type="text" id="shopOwner" class="form-control" placeholder="Do'kon egasi" value="Salimboy" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> Telefon</label>
                                <input type="text" id="shopPhone" class="form-control" placeholder="+998 90 123 45 67" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-map-marker-alt"></i> Manzil</label>
                                <input type="text" id="shopAddress" class="form-control" placeholder="Do'kon manzili" />
                            </div>
                            <button class="btn-primary" onclick="saveGeneralSettings()">
                                <i class="fas fa-save"></i> Saqlash
                            </button>
                        </div>
                    </div>

                    <!-- ===== RECEIPT ===== -->
                    <div class="settings-panel" id="panel-receipt">
                        <div class="settings-card">
                            <h3><i class="fas fa-receipt"></i> Chek dizayni</h3>
                            <div class="form-group">
                                <label><i class="fas fa-align-left"></i> Chek sarlavhasi</label>
                                <input type="text" id="receiptHeader" class="form-control" placeholder="Chek sarlavhasi" value="Salimboy Sale" />
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-align-center"></i> Chek pastki matni</label>
                                <textarea id="receiptFooter" class="form-control" rows="3" placeholder="Chek pastki matni">Salimboy Sale dasturi tomonidan ishlab chiqarilgan</textarea>
                            </div>
                            <button class="btn-primary" onclick="saveReceiptSettings()">
                                <i class="fas fa-save"></i> Saqlash
                            </button>
                            <button class="btn-outline" onclick="previewReceipt()" style="margin-top:8px;">
                                <i class="fas fa-eye"></i> Ko'rish
                            </button>
                        </div>
                    </div>

                    <!-- ===== BACKUP ===== -->
                    <div class="settings-panel" id="panel-backup">
                        <div class="settings-card">
                            <h3><i class="fas fa-database"></i> Zaxira</h3>
                            <div class="backup-info">
                                <p><i class="fas fa-info-circle"></i> Barcha ma'lumotlar brauzeringizda saqlanadi</p>
                                <p><i class="fas fa-clock"></i> Oxirgi zaxira: <span id="lastBackup">-</span></p>
                            </div>
                            <div class="backup-actions">
                                <button class="btn-primary" onclick="createBackup()">
                                    <i class="fas fa-download"></i> Zaxira yaratish
                                </button>
                                <button class="btn-outline" onclick="restoreBackup()">
                                    <i class="fas fa-upload"></i> Zaxirani tiklash
                                </button>
                                <button class="btn-danger" onclick="clearAllData()">
                                    <i class="fas fa-trash"></i> Barcha ma'lumotlarni tozalash
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <!-- ===== RECEIPT PREVIEW MODAL ===== -->
    <div class="modal-overlay" id="receiptPreviewModal">
        <div class="modal-content receipt-preview">
            <div class="modal-header">
                <h3><i class="fas fa-receipt"></i> Chek oldindan ko'rish</h3>
                <button class="modal-close" onclick="closeReceiptPreview()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="receiptPreviewContent"></div>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="../data/database.js"></script>
    <script src="../assets/js/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/settings.js"></script>
    <script src="../assets/js/app.js"></script>
</body>
</html>
